name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - experiment/grounded-intelligence
      - codex/**

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Sales-day boundaries and 09:00 follow-ups are defined in the product's
      # initial Japan locale. Keep CI deterministic instead of inheriting UTC.
      TZ: Asia/Tokyo
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Verify Expo dependency compatibility
        run: npm run doctor

      - name: Typecheck
        run: npm run typecheck

      - name: Run behavioral and persistence contract tests
        if: always()
        run: npm test

      - name: Reject high or critical dependency vulnerabilities
        if: always()
        run: npm run audit:security

      - name: Export web production bundle
        if: always()
        run: npm run export:web

      - name: Export Android production bundle
        if: always()
        run: npm run export:android

      - name: Export iOS production bundle
        if: always()
        run: npm run export:ios
